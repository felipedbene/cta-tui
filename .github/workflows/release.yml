name: release

# Build self-contained single binaries on each platform's native runner and
# attach them to a GitHub Release. Triggered by pushing a version tag.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: aarch64-apple-darwin,        os: macos-14 }
          - { target: x86_64-apple-darwin,         os: macos-13 }
          - { target: x86_64-unknown-linux-musl,   os: ubuntu-latest }
          - { target: aarch64-unknown-linux-musl,  os: ubuntu-latest }
          - { target: x86_64-pc-windows-msvc,      os: windows-latest }
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # taiki-e's action builds, strips, tars (zip on Windows), checksums, and
      # uploads to the release. It uses `cross` automatically for targets that
      # need it (the musl/aarch64 ones), so rustls/ring cross-compile cleanly.
      - name: Build & upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: cta-tui
          target: ${{ matrix.target }}
          archive: cta-tui-$tag-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
